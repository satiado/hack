<!DOCTYPE html>
<html class="light" lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <title>CONECTECA - Login</title>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-surface": "#191c1e",
            "primary-container": "#2563eb",
            "surface-tint": "#0053db",
            "on-primary": "#ffffff",
            "on-error-container": "#93000a",
            "surface-container-low": "#f2f4f6",
            "on-tertiary-fixed": "#002113",
            "secondary": "#4059aa",
            "on-error": "#ffffff",
            "outline": "#737686",
            "on-background": "#191c1e",
            "on-tertiary": "#ffffff",
            "error-container": "#ffdad6",
            "outline-variant": "#c3c6d7",
            "primary-fixed": "#dbe1ff",
            "on-primary-fixed": "#00174b",
            "surface-dim": "#d8dadc",
            "secondary-fixed": "#dce1ff",
            "error": "#ba1a1a",
            "secondary-fixed-dim": "#b6c4ff",
            "on-surface-variant": "#434655",
            "surface-bright": "#f7f9fb",
            "primary": "#004ac6",
            "inverse-on-surface": "#eff1f3",
            "surface-variant": "#e0e3e5",
            "background": "#f7f9fb",
            "inverse-primary": "#b4c5ff",
            "surface": "#f7f9fb",
            "primary-fixed-dim": "#b4c5ff",
            "inverse-surface": "#2d3133",
            "on-secondary-fixed-variant": "#264191",
            "tertiary-fixed": "#6ffbbe",
            "surface-container-highest": "#e0e3e5",
            "surface-container": "#eceef0",
            "on-secondary": "#ffffff",
            "surface-container-lowest": "#ffffff",
            "tertiary-container": "#007d55",
            "on-tertiary-fixed-variant": "#005236",
            "on-secondary-container": "#1d3989",
            "secondary-container": "#8fa7fe",
            "on-secondary-fixed": "#00164e",
            "on-tertiary-container": "#bdffdb",
            "tertiary-fixed-dim": "#4edea3",
            "tertiary": "#006242",
            "on-primary-fixed-variant": "#003ea8",
            "custom-red": "#d32f2f"
          },
          borderRadius: {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          spacing: {
            "base": "8px",
            "container-max": "1280px",
            "margin-mobile": "16px",
            "margin-desktop": "32px",
            "gutter": "24px"
          },
          fontFamily: {
            "headline-sm": ["Inter"],
            "body-md": ["Inter"]
          },
          fontSize: {
            "headline-sm": ["20px", { lineHeight: "28px", fontWeight: "600" }],
            "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }]
          }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .login-card-shadow {
      box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.05);
    }
    .bg-login-pattern {
      background-color: #f7f9fb;
      background-image: radial-gradient(#e0e3e5 0.5px, transparent 0.5px);
      background-size: 24px 24px;
    }
  </style>
</head>
<body class="bg-login-pattern min-h-screen flex flex-col font-body-md text-on-surface">

  <header class="bg-custom-red w-full h-20 flex items-center px-8 shadow-sm z-10">
    <!-- ALTERADO: volta para index.html (menu principal) -->
    <button onclick="window.location.href='login.html'"
      class="text-white bg-transparent border-none cursor-pointer flex items-center mr-3">
      <span class="material-symbols-outlined">arrow_back</span>
    </button>
    <h1 class="text-white text-2xl font-bold uppercase tracking-wider">CONECTECA</h1>
  </header>

  <main class="flex-grow flex items-center justify-center p-4">
    <div class="w-full max-w-[440px]">
      <div class="bg-surface-container-lowest login-card-shadow rounded-xl p-10 flex flex-col items-center">
        <div class="mb-8 text-center">
          <h2 class="text-on-surface font-headline-sm uppercase tracking-tight mb-2">CONTA DO CONECTA</h2>
          <div class="h-1 w-12 bg-custom-red mx-auto rounded-full"></div>
        </div>
        <form class="w-full space-y-6" onsubmit="event.preventDefault();">
          <div class="space-y-1">
            <div class="relative group">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">mail</span>
              <input class="w-full h-14 pl-12 pr-4 bg-surface-container-low border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none text-body-md"
                placeholder="Email" required type="email">
            </div>
          </div>
          <div class="space-y-1">
            <div class="relative group">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
              <input id="senha-input"
                class="w-full h-14 pl-12 pr-12 bg-surface-container-low border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none text-body-md"
                placeholder="Senha" required type="password">
              <button onclick="toggleSenha()" type="button"
                class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors bg-transparent border-none cursor-pointer">
                <span class="material-symbols-outlined" id="senha-icon">visibility</span>
              </button>
            </div>
          </div>
          <div class="flex justify-center">
            <p class="text-sm text-on-surface-variant">
              Esqueceu a senha?
              <a class="text-on-surface font-bold hover:underline transition-all" href="#">Clique aqui</a>
            </p>
          </div>
          <button onclick="window.location.href='validacao.html'" class="w-full h-14 bg-custom-red hover:bg-[#b71c1c] text-white font-headline-sm uppercase tracking-widest rounded-xl shadow-md active:scale-[0.98] transition-all duration-200 mt-4"
            type="submit">
            ENTRAR
          </button>
        </form>
      </div>
    </div>
  </main>

  <script>
    function toggleSenha() {
      const input = document.getElementById('senha-input');
      const icon = document.getElementById('senha-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerText = 'visibility_off';
      } else {
        input.type = 'password';
        icon.innerText = 'visibility';
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      const inputs = document.querySelectorAll('input');
      inputs.forEach(input => {
        input.addEventListener('focus', () => {
          input.parentElement.parentElement.classList.add('scale-[1.01]');
        });
        input.addEventListener('blur', () => {
          input.parentElement.parentElement.classList.remove('scale-[1.01]');
        });
      });
    });
  </script>

</body>
</html>
