<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Conecteca - Validar Livro</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "on-surface": "#191c1e",
          "background": "#f7f9fb",
          "primary": "#004ac6",
          "outline-variant": "#c3c6d7",
          "surface-container-lowest": "#ffffff",
          "surface-container-low": "#f2f4f6",
          "tertiary-container": "#007d55",
          "on-tertiary-container": "#bdffdb",
          "tertiary": "#006242",
          "on-tertiary": "#ffffff",
          "error": "#ba1a1a",
          "on-error": "#ffffff",
          "brand-red": "#cc292b"
        },
        borderRadius: {
          "DEFAULT": "0.25rem",
          "lg": "0.5rem",
          "xl": "0.75rem",
          "full": "9999px"
        },
        fontFamily: {
          "body-md": ["Inter"],
          "headline-lg": ["Inter"],
          "headline-sm": ["Inter"]
        },
        fontSize: {
          "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
          "headline-lg": ["30px", { lineHeight: "38px", letterSpacing: "-0.01em", fontWeight: "700" }],
          "headline-sm": ["20px", { lineHeight: "28px", fontWeight: "600" }]
        }
      }
    }
  }
</script>
<style>
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
</style>
</head>
<body class="bg-background min-h-screen flex flex-col font-body-md text-on-surface">

  <!-- Header -->
  <header class="bg-brand-red w-full h-16 flex items-center px-4 gap-3 shadow-sm">
    <button onclick="window.location.href='permitido.html'"
      class="text-white bg-transparent border-none cursor-pointer flex items-center">
      <span class="material-symbols-outlined">arrow_back</span>
    </button>
    <h1 class="text-white text-xl font-semibold uppercase tracking-wider">CONECTECA</h1>
  </header>

  <!-- Status NFC -->
  <div class="w-full bg-yellow-50 border-b border-yellow-200 px-4 py-2 text-center">
    <p class="text-sm text-yellow-800 font-medium" id="status">
      Aguardando leitura NFC do livro...
    </p>
  </div>

  <!-- Main -->
  <main class="flex-grow flex items-center justify-center p-6">
    <div class="bg-white rounded-xl shadow-lg p-12 flex flex-col items-center max-w-lg w-full text-center border border-surface-container-low relative overflow-hidden">

      <div class="absolute -top-24 -right-24 w-48 h-48 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
      <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-error/5 rounded-full blur-3xl pointer-events-none"></div>

      <h2 class="text-headline-lg font-headline-lg text-on-surface mb-12 relative z-10">
        DESEJA VALIDAR<br>O LIVRO?
      </h2>

      <div class="flex flex-col sm:flex-row gap-6 w-full justify-center relative z-10">

        <!-- Botão SIM -->
        <button onclick="window.location.href='validacao.html'"
          class="bg-tertiary-container hover:bg-tertiary text-on-tertiary-container hover:text-on-tertiary font-headline-sm py-4 px-12 rounded-lg shadow-md hover:shadow-lg transition-all duration-200 min-w-[160px] active:scale-95 flex items-center justify-center gap-2 group cursor-pointer border-none">
          <span class="material-symbols-outlined transition-transform group-hover:scale-110">check_circle</span>
          SIM
        </button>

        <!-- Botão NÃO -->
        <button onclick="window.location.href='permitido.html'"
          class="bg-error hover:opacity-90 text-on-error font-headline-sm py-4 px-12 rounded-lg shadow-md hover:shadow-lg transition-all duration-200 min-w-[160px] active:scale-95 flex items-center justify-center gap-2 group cursor-pointer border-none">
          <span class="material-symbols-outlined transition-transform group-hover:scale-110">cancel</span>
          NÃO
        </button>

      </div>
    </div>
  </main>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

    const supabase = createClient(
      'https://gjigayvnwgobagwtzkrl.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdqaWdheXZud2dvYmFnd3R6a3JsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxMTE0MDksImV4cCI6MjA5NTY4NzQwOX0.AvRtYGBtnumkgCM1Svefxbihb5XyWBmHqiXQooicBKU'
    );

    const statusText = document.getElementById('status');

    const canal = supabase.channel('sala-conecteca');
    canal.on('broadcast', { event: 'liberar' }, (mensagem) => {
      statusText.innerText = "✅ Livro identificado! Redirecionando...";
      statusText.closest('div').classList.replace('bg-yellow-50', 'bg-green-50');
      statusText.closest('div').classList.replace('border-yellow-200', 'border-green-200');
      statusText.classList.replace('text-yellow-800', 'text-green-700');
      setTimeout(() => { window.location.href = 'permitido.html'; }, 1000);
    }).subscribe();
  </script>

</body>
</html>
