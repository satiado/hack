<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

  // 🔴 COLE AS MESMAS CREDENCIAIS DO SUPABASE AQUI 🔴
  const supabaseUrl = 'gjigayvnwgobagwtzkrl';
  const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdqaWdheXZud2dvYmFnd3R6a3JsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxMTE0MDksImV4cCI6MjA5NTY4NzQwOX0.AvRtYGBtnumkgCM1Svefxbihb5XyWBmHqiXQooicBKU';
  const supabase = createClient(supabaseUrl, supabaseKey);

  const statusText = document.getElementById('status-text');
  const startNfcBtn = document.getElementById('start-nfc-btn');

  // Entra na mesma "sala" do notebook para poder enviar mensagens
  const canal = supabase.channel('conecteca-room');
  canal.subscribe();

  if ("NDEFReader" in window) {
    statusText.innerText = "Sensor compatível. Clique acima para começar.";
    startNfcBtn.classList.remove('hidden'); 

    startNfcBtn.addEventListener("click", async () => {
      try {
        const ndef = new NDEFReader();
        await ndef.scan();
        
        statusText.innerText = "Sensor Ativado! Encoste o livro atrás do celular.";
        statusText.classList.replace("text-gray-600", "text-blue-600");
        startNfcBtn.classList.add('hidden');

        ndef.addEventListener("reading", ({ message, serialNumber }) => {
          statusText.innerText = "LIVRO LIDO! Enviando comando para o Notebook...";
          statusText.classList.replace("text-blue-600", "text-green-600");
          
          // 🚀 ENVIA O SINAL VIA SUPABASE BROADCAST
          canal.send({
            type: 'broadcast',
            event: 'liberar_acesso',
            payload: { liberado: true }
          });

          // Reseta a tela do celular após 3 segundos
          setTimeout(() => {
            statusText.innerText = "Pronto para o próximo livro. Encoste a tag.";
            statusText.classList.replace("text-green-600", "text-blue-600");
          }, 3000);

        });
      } catch (error) {
        statusText.innerText = "Erro ao ativar o NFC.";
        statusText.classList.replace("text-gray-600", "text-red-600");
      }
    });
  } else {
    statusText.innerText = "Este navegador não suporta leitura NFC.";
    statusText.classList.replace("text-gray-600", "text-red-600");
  }
</script>
