<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Facial Authentication - Conecteca</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "surface": "#f7f9fb",
          "on-surface": "#191c1e",
          "primary": "#004ac6",
          "on-primary": "#ffffff",
          "custom-red": "#cc2b2b"
        },
        fontFamily: {
          sans: ["Inter", "sans-serif"]
        }
      }
    }
  }
</script>
<style>
  body { font-family: 'Inter', sans-serif; }
  .scanning-line {
    height: 2px;
    background: rgba(204, 43, 43, 0.8);
    box-shadow: 0 0 12px rgba(204, 43, 43, 1);
    position: absolute;
    width: 100%;
    top: 0;
    animation: scan 2.5s linear infinite;
  }
  @keyframes scan {
    0% { top: 0; }
    50% { top: 100%; }
    100% { top: 0; }
  }
  .pulsing-ring {
    position: absolute;
    inset: 0;
    border: 4px solid rgba(204, 43, 43, 0.3);
    border-radius: 9999px;
    animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
  }
  @keyframes pulse-ring {
    0% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.05); opacity: 1; }
    100% { transform: scale(1); opacity: 0.5; }
  }
  .grain-effect {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0.04;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
  }
</style>
</head>
<body class="bg-surface min-h-screen flex flex-col items-center p-0 m-0">

<header class="w-full bg-custom-red p-4 shadow-md sticky top-0 z-10 flex items-center gap-3">
  <button onclick="window.location.href='login.html'"
    class="text-white bg-transparent border-none cursor-pointer flex items-center">
    <span class="material-symbols-outlined">arrow_back</span>
  </button>
  <h1 class="text-white text-2xl font-bold uppercase tracking-wider">CONECTECA</h1>
</header>

<main class="flex-1 w-full max-w-md flex flex-col items-center justify-center gap-10 px-6 py-12">

  <div class="relative w-64 h-64 md:w-80 md:h-80 rounded-full overflow-hidden border-4 border-white shadow-2xl bg-slate-900 transition-all duration-500 ease-in-out" id="media-container">

    <video
      id="camera-feed"
      autoplay
      playsinline
      muted
      class="absolute inset-0 w-full h-full object-cover">
    </video>

    <div class="grain-effect"></div>
    <div class="pulsing-ring"></div>
    <div class="scanning-line"></div>

    <span class="material-symbols-outlined text-white/10 text-9xl select-none absolute inset-0 flex items-center justify-center">account_circle</span>

    <div class="absolute top-8 left-8 border-t-2 border-l-2 border-custom-red/40 w-8 h-8 rounded-tl-lg"></div>
    <div class="absolute top-8 right-8 border-t-2 border-r-2 border-custom-red/40 w-8 h-8 rounded-tr-lg"></div>
    <div class="absolute bottom-8 left-8 border-b-2 border-l-2 border-custom-red/40 w-8 h-8 rounded-bl-lg"></div>
    <div class="absolute bottom-8 right-8 border-b-2 border-r-2 border-custom-red/40 w-8 h-8 rounded-br-lg"></div>

  </div>

  <p class="text-custom-red text-xl font-bold uppercase tracking-widest text-center" id="status-text">
    APROXIME-SE DA CÂMERA
  </p>

</main>

<script>
  async function iniciarCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user" },
        audio: false
      });
      document.getElementById("camera-feed").srcObject = stream;
      startFaceID();
    } catch (erro) {
      console.error("Erro ao acessar a câmera:", erro);
      document.getElementById("status-text").innerText = "PERMISSÃO DE CÂMERA NEGADA";
    }
  }

  function startFaceID() {
    const status = document.getElementById('status-text');
    const container = document.getElementById('media-container');

    container.classList.add('scale-105');
    status.innerText = "ESCANEANDO ROSTO...";
    status.classList.add('animate-pulse');
    container.classList.add('ring-4', 'ring-custom-red/50');

    setTimeout(() => {
      status.innerText = "ROSTO IDENTIFICADO";
      status.classList.remove('animate-pulse');
      status.classList.replace('text-custom-red', 'text-green-600');
      container.classList.remove('scale-105', 'ring-4', 'ring-custom-red/50');
      container.classList.add('border-green-500');

      const line = document.querySelector('.scanning-line');
      if (line) line.style.display = 'none';

      const ring = document.querySelector('.pulsing-ring');
      if (ring) ring.style.borderColor = 'rgba(34, 197, 94, 0.3)';

      // Aguarda 1.5s exibindo "ROSTO IDENTIFICADO" antes de redirecionar
      setTimeout(() => {
        window.location.href = 'pergunta.html';
      }, 1500);

    }, 3000);
  }

  window.onload = iniciarCamera;
</script>

</body>
</html>
