<style>
  .material-symbols-outlined {
    font-family: 'Material Symbols Outlined';
    font-weight: normal;
    font-style: normal;
    font-size: 24px;
    line-height: 1;
    letter-spacing: normal;
    text-transform: none;
    display: inline-block;
    white-space: nowrap;
    word-wrap: normal;
    direction: ltr;
    -webkit-font-feature-settings: 'liga';
    -webkit-font-smoothing: antialiased;
  }
  @keyframes scan-line {
    0% { transform: translateY(-300%); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateY(300%); opacity: 0; }
  }
  .animate-scan-line {
    animation: scan-line 3s linear infinite;
  }
  @keyframes fade-in-up {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-fade-in-up {
    animation: fade-in-up 0.8s ease-out forwards;
  }
</style>
</head>
<body class="bg-background min-h-screen flex flex-col font-body-md text-on-surface">

  <!-- Header -->
  <header class="bg-brand-red w-full h-16 flex items-center px-margin-desktop fixed top-0 left-0 z-50 gap-3">
    <button onclick="window.location.href='permitido.html'"
      class="text-white bg-transparent border-none cursor-pointer flex items-center">
      <span class="material-symbols-outlined">arrow_back</span>
    </button>
    <h1 class="font-headline-sm text-headline-sm text-white uppercase tracking-wider">CONECTECA</h1>
  </header>

  <!-- Main -->
  <main class="flex-grow flex flex-col items-center justify-center pt-16 px-margin-mobile md:px-margin-desktop">
    <div class="flex flex-col items-center max-w-lg text-center space-y-8 animate-fade-in-up">

      <h2 class="font-headline-xl text-headline-xl uppercase text-on-background leading-tight">
        DESEJA VALIDAR<br>O LIVRO?
      </h2>

      <!-- Botões -->
      <div class="flex flex-col sm:flex-row gap-6 w-full justify-center mt-4">

        <button onclick="window.location.href='validacao.html'"
          class="bg-tertiary-container hover:bg-tertiary text-on-tertiary-container hover:text-on-tertiary font-headline-sm py-4 px-12 rounded-lg shadow-md hover:shadow-lg transition-all duration-200 min-w-[160px] active:scale-95 flex items-center justify-center gap-2 group cursor-pointer border-none">
          <span class="material-symbols-outlined transition-transform group-hover:scale-110">check_circle</span>
          SIM
        </button>

        <button onclick="window.location.href='permitido.html'"
          class="bg-error hover:opacity-90 text-on-error font-headline-sm py-4 px-12 rounded-lg shadow-md hover:shadow-lg transition-all duration-200 min-w-[160px] active:scale-95 flex items-center justify-center gap-2 group cursor-pointer border-none">
          <span class="material-symbols-outlined transition-transform group-hover:scale-110">cancel</span>
          NÃO
        </button>

      </div>

      <!-- Ícone do livro -->
      <div class="mt-8 relative flex justify-center items-center h-64 w-64">
        <span class="material-symbols-outlined text-surface-dim" style="font-size: 180px; font-variation-settings: 'FILL' 1;">book</span>
        <div class="absolute inset-0 bg-gradient-to-b from-transparent via-primary-fixed-dim/30 to-transparent animate-scan-line h-4 w-full rounded-full blur-sm top-1/2 -translate-y-1/2"></div>
      </div>

      <!-- Status NFC -->
      <p class="text-on-surface-variant text-body-md font-medium" id="status">
        Aguardando leitura NFC do livro...
      </p>

    </div>
  </main>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

    const supabase = createClient(
      'gjigayvnwgobagwtzkrl',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdqaWdheXZud2dvYmFnd3R6a3JsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxMTE0MDksImV4cCI6MjA5NTY4NzQwOX0.AvRtYGBtnumkgCM1Svefxbihb5XyWBmHqiXQooicBKU'
    );

    const statusText = document.getElementById('status');

    const canal = supabase.channel('sala-conecteca');
    canal.on('broadcast', { event: 'liberar' }, () => {
      statusText.innerText = "✅ Livro identificado! Redirecionando...";
      statusText.classList.add('text-tertiary');
      setTimeout(() => { window.location.href = 'permitido.html'; }, 1000);
    }).subscribe();
  </script>

</body>
