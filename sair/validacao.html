<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Conecteca - Scan Book</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined'; font-weight: normal; font-style: normal; font-size: 24px;
            line-height: 1; letter-spacing: normal; text-transform: none; display: inline-block;
            white-space: nowrap; word-wrap: normal; direction: ltr; -webkit-font-feature-settings: 'liga'; -webkit-font-smoothing: antialiased;
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: { "primary-fixed-dim": "#b4c5ff", "on-background": "#191c1e", "surface-dim": "#d8dadc", "brand-red": "#cc292b", "brand-green": "#4edea3" },
                    fontFamily: { "headline-xl": ["Inter"], "headline-sm": ["Inter"] },
                    fontSize: { "headline-xl": ["36px", { "lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700" }], "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }] }
                }
            }
        }
    </script>
</head>
<body class="bg-white min-h-screen flex flex-col text-on-background">

    <header class="bg-brand-red w-full h-16 flex items-center px-8 fixed top-0 left-0 z-50">
        <h1 class="font-headline-sm text-headline-sm text-white uppercase tracking-wider">CONECTECA</h1>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center pt-16 px-4">
        <div class="flex flex-col items-center max-w-lg text-center space-y-8 animate-fade-in-up">
            <h2 id="status-texto" class="font-headline-xl text-headline-xl uppercase text-on-background leading-tight transition-all duration-300">
                APROXIME O<br>LIVRO ABAIXO<br>PARA A LEITURA
            </h2>
            <div id="seta-animada" class="animate-bounce mt-4">
                <span class="material-symbols-outlined text-[48px] text-on-background">arrow_downward</span>
            </div>
            
            <div class="mt-8 relative flex justify-center items-center h-64 w-64">
                <span id="icone-livro" class="material-symbols-outlined text-[180px] text-surface-dim transition-all duration-300" style="font-variation-settings: 'FILL' 1;">book</span>
                <div id="linha-scan" class="absolute inset-0 bg-gradient-to-b from-transparent via-primary-fixed-dim/30 to-transparent animate-scan-line h-4 w-full rounded-full blur-sm top-1/2 -translate-y-1/2"></div>
            </div>
        </div>
    </main>

    <style>
        @keyframes scan-line { 0% { transform: translateY(-300%); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(300%); opacity: 0; } }
        .animate-scan-line { animation: scan-line 3s linear infinite; }
        @keyframes fade-in-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in-up { animation: fade-in-up 0.8s ease-out forwards; }
    </style>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

        const supabase = createClient('https://gjigayvnwgobagwtzkrl.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdqaWdheXZud2dvYmFnd3R6a3JsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxMTE0MDksImV4cCI6MjA5NTY4NzQwOX0.AvRtYGBtnumkgCM1Svefxbihb5XyWBmHqiXQooicBKU');
        const canal = supabase.channel('sala-conecteca');

        const statusTexto = document.getElementById('status-texto');
        const seta = document.getElementById('seta-animada');
        const iconeLivro = document.getElementById('icone-livro');
        const linhaScan = document.getElementById('linha-scan');

        canal.on('broadcast', { event: 'liberar' }, (mensagem) => {
            const dados = message.payload || mensagem.payload; // Garante a captura do objeto independente do padrão
            
            if (dados.cadastrado) {
                // 📖 Cenário 1: O livro existe no banco! Mostra o título dele
                statusTexto.innerHTML = `LIVRO DETECTADO!<br><span class="text-brand-green font-bold text-2xlblock mt-2">"${dados.titulo}"</span>`;
                statusTexto.style.color = "#004ac6";
                iconeLivro.style.color = "#4edea3";
                if(seta) seta.style.display = 'none';
                if(linhaScan) linhaScan.style.display = 'none';

                // Redireciona para a página permitida após 2.5 segundos
                setTimeout(() => {
                    window.location.href = 'permitido.html';
                }, 2500);
            } else {
                // ⚠️ Cenário 2: Tag lida, mas não está cadastrada na tabela 'livros'
                statusTexto.innerHTML = `LIVRO NÃO CADASTRADO!<br><span class="text-gray-500 font-normal text-sm block mt-2">NFC: ${dados.tag_id}</span>`;
                statusTexto.style.color = "#cc292b";
                iconeLivro.style.color = "#cc292b";
                
                // Reseta a tela do notebook de volta para o padrão após 4 segundos
                setTimeout(() => {
                    statusTexto.innerHTML = "APROXIME O<br>LIVRO ABAIXO<br>PARA A LEITURA";
                    statusTexto.style.color = "#191c1e";
                    iconeLivro.style.color = "#d8dadc";
                    if(seta) seta.style.display = 'block';
                    if(linhaScan) linhaScan.style.display = 'block';
                }, 4000);
            }
        }).subscribe();
    </script>
</body>
</html>
