<body class="bg-background h-full font-body-sm text-on-surface antialiased flex flex-col items-center">

<form class="w-full space-y-6 flex flex-col items-center">
<!-- Email Input -->
<div class="w-full max-w-xs">
<label class="sr-only" for="email">Email</label>
<input class="w-full h-[52px] bg-surface-container px-4 rounded-lg border border-outline-variant text-body-md font-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-colors" id="email" name="email" placeholder="Email" required="" type="email"/>
</div>
<!-- New Password Input -->
<div class="w-full max-w-xs">
<label class="sr-only" for="new_password">Nova senha</label>
<input class="w-full h-[52px] bg-surface-container px-4 rounded-lg border border-outline-variant text-body-md font-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-colors" id="new_password" name="new_password" placeholder="Nova senha" required="" type="password"/>
</div>
<!-- Confirm Password Input -->
<div class="w-full max-w-xs">
<label class="sr-only" for="confirm_password">Confirme senha</label>
<input class="w-full h-[52px] bg-surface-container px-4 rounded-lg border border-outline-variant text-body-md font-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-colors" id="confirm_password" name="confirm_password" placeholder="Confirme senha" required="" type="password"/>
</div>
<!-- Login Link -->
<div class="w-full max-w-xs text-center pt-2">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                        Já tem conta? <a class="font-bold text-on-surface hover:text-primary transition-colors" href="gmail-login.html">Clique aqui</a>
</p>
</div>
<!-- Submit Button -->
<div class="w-full max-w-xs pt-4 flex justify-center">
<button onclick="window.location.href='gmail-login.html'" class="bg-brand-red hover:bg-brand-red-dark text-on-primary font-headline-sm text-headline-sm rounded-lg h-14 px-8 w-[200px] flex items-center justify-center transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-red" type="submit">
                        Resetar

</div>
